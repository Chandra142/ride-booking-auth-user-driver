server:
  port: 8083

spring:
  application:
    name: driver-service

  datasource:
    url: jdbc:postgresql://localhost:5432/ride_booking
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        naming:
          physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

  # ========================
  # REDIS CONFIGURATION
  # ========================
  data:
    redis:
      host: localhost
      port: 6379
      # No password for local development
      # In production, set a strong password via REDIS_PASSWORD env var

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
