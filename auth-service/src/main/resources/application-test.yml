# ============================================================
# AUTH SERVICE — TEST CONFIGURATION
# ============================================================
#
# This profile is activated with:
#   mvn spring-boot:run -Dspring-boot.run.profiles=test
#
# It overrides ONLY the properties that differ from application.yml.
# Everything NOT specified here falls back to application.yml.
#
# In test mode, we use H2 (in-memory database) so you can run
# the service WITHOUT installing PostgreSQL.

spring:
  # ========================
  # DATABASE — H2 (In-Memory)
  # ========================
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      # Accessible at: http://localhost:8081/h2-console
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    # Show SQL for debugging
    show-sql: true

  # ========================
  # EUREKA — DISABLED IN TEST MODE
  # ========================
  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false
