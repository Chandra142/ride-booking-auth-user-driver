# Test profile — uses H2 in-memory database, no Eureka

spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false
